name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # We commit settings.gradle.kts + gradle/libs.versions.toml but NOT
      # the wrapper jar (it's binary). setup-gradle@v4 provides the gradle
      # binary directly, so we call `gradle` instead of `./gradlew`.
      - name: Assemble debug + release
        run: gradle :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ayatune-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: ayatune-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
